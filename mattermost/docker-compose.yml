services:
  postgres:
    image: postgres:15-alpine
    container_name: mattermost-db
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: ${MM_DB_USER:-mattermost}
      POSTGRES_PASSWORD: ${MM_DB_PASSWORD:?MM_DB_PASSWORD is required}
      POSTGRES_DB: mattermost
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MM_DB_USER:-mattermost}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  mattermost:
    image: mattermost/mattermost-team-edition:latest
    container_name: mattermost
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: postgres://${MM_DB_USER:-mattermost}:${MM_DB_PASSWORD}@postgres:5432/mattermost?sslmode=disable&connect_timeout=10

      # Site URL
      MM_SERVICESETTINGS_SITEURL: ${MM_SITE_URL:-http://localhost:8081}

      # Auto-create admin on first boot
      MM_ADMIN_EMAIL: ${MM_ADMIN_EMAIL}
      MM_ADMIN_USERNAME: ${MM_ADMIN_USERNAME}
      MM_ADMIN_PASSWORD: ${MM_ADMIN_PASSWORD}

      # Skip setup wizard
      MM_SERVICESETTINGS_ENABLEONBOARDING: "false"

      # Security — invite only, no public sign-up
      MM_TEAMSETTINGS_ENABLEOPENSERVER: "false"
      MM_TEAMSETTINGS_ENABLETEAMCREATION: "false"
      MM_TEAMSETTINGS_ENABLEUSERCREATION: "true"
      MM_SERVICESETTINGS_ENABLEEMAILINVITATIONS: "true"
      MM_TEAMSETTINGS_RESTRICTTEAMINVITES: "true"

      # Disable OAuth / SSO
      MM_GOOGLESETTINGS_ENABLE: "false"
      MM_GITLABSETTINGS_ENABLE: "false"
      MM_OFFICE365SETTINGS_ENABLE: "false"

      # No public file links
      MM_SERVICESETTINGS_ENABLEPUBLICLINK: "false"
      MM_FILESETTINGS_ENABLEPUBLICLINK: "false"

      # Session hardening
      MM_SERVICESETTINGS_SESSIONLENGTHWEBINDAYS: "14"
      MM_SERVICESETTINGS_SESSIONLENGTHMOBILEINDAYS: "30"

      # Rate limiting
      MM_RATELIMITSETTINGS_ENABLE: "true"
      MM_RATELIMITSETTINGS_PERSEC: 10
      MM_RATELIMITSETTINGS_MAXBURST: 100
      MM_RATELIMITSETTINGS_MEMORYSTORE_SIZE: 10000

      # Logging
      MM_LOGSETTINGS_ENABLECONSOLE: "true"
      MM_LOGSETTINGS_CONSOLELEVEL: "INFO"
      MM_LOGSETTINGS_ENABLEFILE: "true"
      MM_LOGSETTINGS_FILELEVEL: "INFO"

    volumes:
      - mattermost_data:/mattermost/data
      - mattermost_logs:/mattermost/logs
      - mattermost_config:/mattermost/config
      - mattermost_plugins:/mattermost/plugins
      - mattermost_client_plugins:/mattermost/client/plugins
    restart: unless-stopped
    networks:
      - internal
      - proxy

  nginx:
    image: nginx:alpine
    container_name: chat-nginx
    security_opt:
      - no-new-privileges:true
    depends_on:
      - mattermost
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    networks:
      - proxy

networks:
  internal:
    internal: true
  proxy:
    driver: bridge

volumes:
  postgres_data:
  mattermost_data:
  mattermost_logs:
  mattermost_config:
  mattermost_plugins:
  mattermost_client_plugins:
