user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 100M;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/xml text/javascript 
             application/x-javascript application/xml+rss 
             application/json application/javascript;

  # WebSocket support
  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  # Rate limiting - more lenient for initial page loads
  limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=strict:10m rate=5r/s;

  # Upstream n8n service
  upstream n8n_backend {
    server n8n:5678;
    keepalive 32;
  }

  # HTTP to HTTPS redirect
  server {
    listen 80;
    server_name _;
    return 301 https://$http_host$request_uri;
  }

  # HTTPS server with WebSocket support
  server {
    listen 443 ssl http2;
    server_name _;

    # SSL certificates (replace with actual paths or use self-signed)
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static assets (no rate limiting - critical for UI load)
    location /assets/ {
      proxy_pass http://n8n_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_redirect off;
      proxy_buffering off;
      # Cache assets for 1 hour
      proxy_cache_valid 200 1h;
    }

    # API endpoints with moderate rate limiting
    location /api/ {
      limit_req zone=general burst=50 nodelay;
      limit_req_status 429;
      proxy_pass http://n8n_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_redirect off;
      proxy_buffering off;
      proxy_read_timeout 60;
    }

    # WebSocket endpoints (no rate limiting, direct pass-through)
    location ~ ^/(socket\.io|ws|webhook) {
      proxy_pass http://n8n_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_redirect off;
      proxy_buffering off;
      proxy_read_timeout 86400;
    }

    # Main UI and all other traffic
    location / {
      limit_req zone=general burst=50 nodelay;
      limit_req_status 429;
      proxy_pass http://n8n_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_redirect off;
      proxy_buffering off;
    }

    # Health check endpoint
    location /health {
      access_log off;
      proxy_pass http://n8n_backend;
      proxy_http_version 1.1;
    }
  }
}
