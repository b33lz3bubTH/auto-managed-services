services:
  vault:
    image: hashicorp/vault:1.17
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "sh", "-c", "VAULT_ADDR=http://127.0.0.1:8200 vault status"]
      interval: 2s
      timeout: 3s
      retries: 10

  vault-init:
    image: hashicorp/vault:1.17
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
    entrypoint: /bin/sh
    command:
      - -c
      - |
        vault secrets enable transit 2>/dev/null || true
        echo "Vault transit engine enabled — tenants provisioned via API"
    restart: "no"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
      VAULT_PRO_API_KEY: ${VAULT_PRO_API_KEY:?Set VAULT_PRO_API_KEY in .env or environment}
    depends_on:
      vault-init:
        condition: service_completed_successfully
