services:
  mongodb:
    image: mongo:7.0
    container_name: tinode-mongodb
    restart: unless-stopped
    command: ["mongod", "--bind_ip_all", "--replSet", "rs0"]
    volumes:
      - mongodb-data:/data/db
    networks:
      - tinode-net
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ping:1}).ok' | grep -q 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  init-mongo:
    image: mongo:7.0
    container_name: tinode-mongo-init
    restart: "no"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - tinode-net
    command: >
      bash -c '
        mongosh --host mongodb:27017 --quiet --eval "
          try {
            rs.status();
            print(\"Replica set already initialized.\");
          } catch(e) {
            print(\"Initializing replica set...\");
            rs.initiate({
              _id: \"rs0\",
              members: [{ _id: 0, host: \"mongodb:27017\" }]
            });
          }
          for (var i = 0; i < 60; i++) {
            try {
              if (rs.status().myState === 1) {
                print(\"PRIMARY ready.\");
                quit(0);
              }
            } catch(e) {}
            sleep(2000);
          }
          print(\"ERROR: timed out\");
          quit(1);
        "
      '

  tinode:
    image: tinode/tinode-mongodb:latest
    container_name: tinode-srv
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      init-mongo:
        condition: service_completed_successfully
    environment:
      WAIT_FOR: mongodb:27017
      MONGO_DSN: "mongodb://mongodb:27017/tinode?replicaSet=rs0&directConnection=true"
      RESET_DB: "false"
      UPGRADE_DB: "false"
      DEFAULT_HOST: "localhost:8080"
    networks:
      - tinode-net
    expose:
      - "6060"
    healthcheck:
      test: ["CMD-SHELL", "pgrep tinode > /dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  nginx:
    image: nginx:alpine
    container_name: tinode-nginx
    restart: unless-stopped
    depends_on:
      - tinode
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - tinode-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  mongodb-data:

networks:
  tinode-net:
    driver: bridge
